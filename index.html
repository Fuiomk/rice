<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciallo - 幻想乡入口 </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Serif+SC:wght@700&display=swap');

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: linear-gradient(-45deg, #ffe6fa, #fff0f5, #ffe4e1, #ffd1dc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Nunito', 'Noto Serif SC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.65);
            padding: 3rem 5rem;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatCard 6s ease-in-out infinite;
        }

        .container:hover {
            transform: scale(1.05);
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon {
            font-size: 4.5rem;
            margin-bottom: 0px;
            display: inline-block;
            color: #ff8b94;
            text-shadow: 0 5px 15px rgba(255, 139, 148, 0.4);
            animation: bounceIcon 2s infinite;
        }

        @keyframes bounceIcon {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px) scale(1.1); }
            60% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 4.5rem;
            margin: 10px 0 0 0;
            color: #ff6f91;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px #fff, 5px 5px 15px rgba(255, 111, 145, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            color: #d687a4;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .links {
            margin-top: 35px;
        }

        .links a {
            display: inline-block;
            background: #ff6f91;
            color: #fff;
            text-decoration: none;
            padding: 12px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(255, 111, 145, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .links a:hover {
            background: #ff8b94;
            box-shadow: 0 12px 25px rgba(255, 139, 148, 0.6);
            transform: translateY(-3px);
        }

        .links a:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(255, 111, 145, 0.4);
        }

        .touhou-sticker {
            position: absolute;
            width: 80px; 
            height: 80px;
            pointer-events: none; 
            z-index: 999;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.15));
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="icon">☯</div>
        <h1>rice</h1>
        <div class="subtitle">✨ 少女祈祷中 ✨</div>
        
        <div class="links">
            <!-- 🌟 这里修改了跳转链接 🌟 -->
            <a href="https://yukiom.us.ci/Web/intro.html">Enter</a>
        </div>
    </div>

    <script>
        // 🌟 换回了稳定可用的直链图，如果想换自己的，一定要确保是纯粹的图片直链 🌟
        const stickers = [
            'https://media1.tenor.com/m/ipusVxTlMCkAAAAC/yeah.gif', // 灵梦
            'https://media.tenor.com/45RM0-hEnm0AAAAi/marisa.gif'  // 魔理沙
        ];

        document.addEventListener('click', function(e) {
            if(e.target.tagName.toLowerCase() === 'a') return;

            const img = document.createElement('img');
            
            const randomSticker = stickers[Math.floor(Math.random() * stickers.length)];
            img.src = randomSticker;
            img.className = 'touhou-sticker';

            img.style.left = (e.pageX - 40) + 'px';
            img.style.top = (e.pageY - 40) + 'px';

            const rot = (Math.random() - 0.5) * 40; 
            img.style.transform = `rotate(${rot}deg) scale(0)`;

            document.body.appendChild(img);

            requestAnimationFrame(() => {
                img.style.transform = `rotate(${rot}deg) scale(1)`;
                img.style.opacity = '1';
            });

            setTimeout(() => {
                img.style.transform = `translateY(-80px) rotate(${rot}deg) scale(0.8)`;
                img.style.opacity = '0';
                
                setTimeout(() => {
                    img.remove();
                }, 400); 
            }, 800); 
        });
    </script>
</body>
</html>
