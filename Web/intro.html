<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意个人展示卡片</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050510;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* 动态背景画布 */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 环境光晕 */
        .ambient-light {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(112,0,255,0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 2;
            animation: pulseLight 8s infinite alternate;
        }
        .ambient-light.right {
            right: 10%;
            bottom: 10%;
            background: radial-gradient(circle, rgba(0,212,255,0.3) 0%, rgba(0,0,0,0) 70%);
        }

        /* 玻璃拟态卡片主体 */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        /* 悬浮动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseLight {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0.4; }
        }

        /* 头像设计 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            padding: 4px; /* 渐变边框效果 */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #111;
        }
        .avatar:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* 文本排版 */
        .name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .skill-tag {
            font-size: 12px;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1d1d1;
            transition: all 0.3s ease;
            cursor: default;
        }
        .skill-tag:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d2ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 互动按钮 */
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 0, 204, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(255, 0, 204, 0.6);
            transform: scale(1.05);
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

    </style>
</head>
<body>

    <!-- Canvas 星空背景 -->
    <canvas id="canvas-bg"></canvas>

    <!-- 氛围光晕 -->
    <div class="ambient-light"></div>
    <div class="ambient-light right"></div>

    <!-- 前景展示卡片 -->
    <div class="glass-card">
        <div class="avatar">
            <!-- 使用了Unsplash的免费高质量抽象图片作为演示头像 -->
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=256&auto=format&fit=crop" alt="Profile Avatar">
        </div>
        <h1 class="name">Nebula Walker</h1>
        <p class="title">CREATIVE DEVELOPER & DESIGNER</p>
        
        <div class="skills">
            <span class="skill-tag">UI/UX</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Three.js</span>
            <span class="skill-tag">WebGL</span>
            <span class="skill-tag">CSS3</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary">探索作品</button>
            <button class="btn btn-secondary">联系我</button>
        </div>
    </div>

    <!-- 粒子特效脚本 -->
    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // 鼠标位置
        let mouse = { x: null, y: null };

        // 监听鼠标移动
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        
        // 鼠标移出重置
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 初始化Canvas大小
        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5; // 粒子大小
                this.speedX = Math.random() * 1 - 0.5; // 水平速度
                this.speedY = Math.random() * 1 - 0.5; // 垂直速度
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.1})`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // 边缘检测与反弹
                if (this.x > width || this.x < 0) this.speedX *= -1;
                if (this.y > height || this.y < 0) this.speedY *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // 创建粒子群
        function initParticles() {
            particles = [];
            // 根据屏幕大小计算粒子数量
            let particleCount = (width * height) / 9000;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // 绘制粒子之间的连线（星座连线效果）
        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = dx * dx + dy * dy;

                    // 粒子之间距离近时连线
                    if (distance < 10000) {
                        let opacity = 1 - (distance / 10000);
                        ctx.strokeStyle = `rgba(0, 210, 255, ${opacity * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
                
                // 鼠标与粒子的交互连线
                if (mouse.x && mouse.y) {
                    let dxMouse = particles[a].x - mouse.x;
                    let dyMouse = particles[a].y - mouse.y;
                    let distanceMouse = dxMouse * dxMouse + dyMouse * dyMouse;
                    
                    if (distanceMouse < 20000) {
                        let opacityMouse = 1 - (distanceMouse / 20000);
                        ctx.strokeStyle = `rgba(255, 0, 204, ${opacityMouse * 0.5})`;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画主循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }

        // 窗口尺寸改变时重新初始化
        window.addEventListener('resize', () => {
            initCanvas();
            initParticles();
        });

        // 启动
        initCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
