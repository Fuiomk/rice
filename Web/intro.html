<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻想乡个人展示</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Serif+SC:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Noto Serif SC', serif;
            /* 柔和的樱花粉渐变背景 */
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #d687a4;
        }

        /* 樱花背景画布 */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 软萌氛围光 */
        .ambient-light {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 2;
            animation: pulseLight 10s infinite alternate;
        }
        .ambient-light.right {
            right: 5%;
            bottom: 5%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
        }

        /* 软萌玻璃拟态卡片 */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 400px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            animation: float 5s ease-in-out infinite;
        }

        /* 悬浮装饰：红白缎带 */
        .glass-card::before {
            content: '☯';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: #ff6f91;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(255, 111, 145, 0.5);
            border: 4px solid white;
            z-index: 11;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulseLight {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0.3; }
        }

        /* 头像设计：带旋转边框 */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 10px auto 25px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            padding: 5px;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            background: #fff;
        }
        .avatar:hover {
            transform: scale(1.15) rotate(10deg);
        }

        /* 文本排版 */
        .name {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #ff6f91;
            text-shadow: 2px 2px 0px white;
        }

        .title {
            font-size: 14px;
            color: #d687a4;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* 技能标签：气泡感 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }
        .skill-tag {
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 25px;
            background: #fff;
            border: 2px solid #ffe1e9;
            color: #ff8b94;
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: default;
        }
        .skill-tag:hover {
            background: #ff6f91;
            color: #fff;
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 5px 15px rgba(255, 111, 145, 0.3);
        }

        /* 互动按钮 */
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 14px 30px;
            border-radius: 35px;
            border: none;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }
        .btn-primary {
            background: #ff6f91;
            color: white;
            box-shadow: 0 8px 20px rgba(255, 111, 145, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 111, 145, 0.6);
        }
        .btn-secondary {
            background: white;
            color: #ff6f91;
            border: 2px solid #ff6f91;
        }
        .btn-secondary:hover {
            background: #fff0f5;
            transform: translateY(-5px);
        }

        /* 点击贴图样式 */
        .touhou-sticker {
            position: absolute;
            width: 80px; 
            height: 80px;
            pointer-events: none; 
            z-index: 999;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            filter: drop-shadow(0 5px 10px rgba(255, 182, 193, 0.5));
        }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="ambient-light"></div>
    <div class="ambient-light right"></div>

    <div class="glass-card">
        <div class="avatar">
            <!-- 默认一张可爱的博丽灵梦头像 -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0Y64vG7F4B-37q_G_1W-7Xyv4M7rEaJ93Mw&s" alt="Reimu Avatar">
        </div>
        <h1 class="name">Reimu Hakurei</h1>
        <p class="title">博丽神社的乐园巫女 ✨</p>
        
        <div class="skills">
            <span class="skill-tag">退治妖怪</span>
            <span class="skill-tag">梦想天生</span>
            <span class="skill-tag">收集香火</span>
            <span class="skill-tag">空中飞行</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary">进入神社</button>
            <button class="btn btn-secondary">供奉香火</button>
        </div>
    </div>

    <script>
        // ==== 背景：樱花飘落效果 ====
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, petals = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Petal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 5 + 5;
                this.speedX = Math.random() * 2 + 1;
                this.speedY = Math.random() * 1.5 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }
            update() {
                this.y += this.speedY;
                this.x += Math.sin(this.y / 50) * this.speedX;
                this.angle += this.spin;
                if (this.y > height) {
                    this.y = -20;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                // 绘制一个简单的花瓣形状
                ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 192, 203, ${this.opacity})`;
                ctx.fill();
                ctx.restore();
            }
        }

        function setupPetals() {
            petals = [];
            for (let i = 0; i < 60; i++) petals.push(new Petal());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { initCanvas(); setupPetals(); });
        initCanvas();
        setupPetals();
        animate();

        // ==== 交互：点击生成东方贴图 ====
        const stickers = [
            'https://media.tenor.com/m50PZ55o1c8AAAAi/reimu-hakurei-touhou.gif', 
            'https://media.tenor.com/N6uO8wEw2K0AAAAi/marisa-kirisame-touhou.gif'  
        ];

        document.addEventListener('click', function(e) {
            if(e.target.tagName.toLowerCase() === 'button') return;

            const img = document.createElement('img');
            img.src = stickers[Math.floor(Math.random() * stickers.length)];
            img.className = 'touhou-sticker';
            img.style.left = (e.pageX - 40) + 'px';
            img.style.top = (e.pageY - 40) + 'px';
            const rot = (Math.random() - 0.5) * 40; 
            img.style.transform = `rotate(${rot}deg) scale(0)`;
            document.body.appendChild(img);

            requestAnimationFrame(() => {
                img.style.transform = `rotate(${rot}deg) scale(1)`;
                img.style.opacity = '1';
            });

            setTimeout(() => {
                img.style.transform = `translateY(-80px) rotate(${rot}deg) scale(0.8)`;
                img.style.opacity = '0';
                setTimeout(() => img.remove(), 400); 
            }, 800); 
        });
    </script>
</body>
</html>
