<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>209点饭系统 - 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* 复用主站主题变量 */
        :root, [data-theme="light"] {
            --bg-primary: #FFF5F8; --bg-secondary: #FFF0F5;
            --card-bg: rgba(255, 255, 255, 0.65); --card-border: rgba(255, 200, 220, 0.5);
            --card-shadow: 0 8px 40px rgba(255, 150, 180, 0.1), 0 2px 8px rgba(0,0,0,0.02);
            --text-primary: #3D2C3E; --text-secondary: #8B7A8E; --text-tertiary: #B8A5BB;
            --accent-pink: #FF7EB3; --accent-pink-deep: #FF5C8D;
            --gradient-primary: linear-gradient(135deg, #FF5C8D 0%, #FF7EB3 40%, #B088F9 100%);
            --order-row-bg: rgba(255, 255, 255, 0.5); --order-row-hover: rgba(255, 255, 255, 0.9);
            --border-soft: rgba(255, 200, 220, 0.4);
            --danger-bg: rgba(255, 92, 141, 0.1);
        }
        [data-theme="dark"] {
            --bg-primary: #1A1118; --bg-secondary: #1E1420;
            --card-bg: rgba(35, 25, 38, 0.7); --card-border: rgba(255, 126, 179, 0.12);
            --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0,0,0,0.15);
            --text-primary: #F0E4F2; --text-secondary: #A892AB; --text-tertiary: #6B5A6E;
            --accent-pink: #FF8FBF; --accent-pink-deep: #FF5C8D;
            --gradient-primary: linear-gradient(135deg, #FF3D7F 0%, #FF5C8D 40%, #A87CFF 100%);
            --order-row-bg: rgba(40, 30, 45, 0.4); --order-row-hover: rgba(50, 38, 55, 0.8);
            --border-soft: rgba(255, 126, 179, 0.1);
            --danger-bg: rgba(255, 92, 141, 0.15);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans SC', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 20px 16px; display: flex; flex-direction: column; align-items: center;}
        
        .container { max-width: 600px; width: 100%; position: relative; z-index: 1; }
        
        /* 登录遮罩 */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--bg-primary); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: var(--card-bg); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 360px;
            box-shadow: var(--card-shadow); border: 1px solid var(--card-border); text-align: center;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .login-box h2 { margin-bottom: 20px; font-weight: 800; color: var(--text-primary); }
        .login-box input {
            width: 100%; padding: 14px; border-radius: 16px; border: 1.5px solid var(--border-soft);
            background: transparent; color: var(--text-primary); font-size: 1rem; text-align: center; margin-bottom: 20px; outline: none;
        }
        .login-box input:focus { border-color: var(--accent-pink); }
        .btn {
            background: var(--gradient-primary); color: white; border: none; padding: 14px; border-radius: 16px;
            width: 100%; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,126,179,0.3); }
        .btn-danger { background: #FF5C8D; margin-top: 15px;}

        /* 面板卡片 */
        .card {
            background: var(--card-bg); border-radius: 28px; padding: 28px 22px; margin-bottom: 20px;
            box-shadow: var(--card-shadow); border: 1px solid var(--card-border);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.8rem; font-weight: 900; }
        
        /* 统计数字 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box {
            background: var(--order-row-bg); padding: 16px; border-radius: 20px;
            text-align: center; border: 1px solid var(--border-soft);
        }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--accent-pink-deep); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }

        /* 列表 */
        .order-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; background: var(--order-row-bg); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border-soft);
        }
        .order-main { display: flex; flex-direction: column; gap: 4px; }
        .order-name { font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; }
        .order-time { font-size: 0.75rem; color: var(--text-tertiary); }
        .badge { background: var(--danger-bg); color: var(--accent-pink-deep); padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: 700;}
        
        .btn-delete {
            background: var(--danger-bg); color: var(--accent-pink-deep); padding: 8px 14px;
            border-radius: 12px; border: 1px solid var(--border-soft); cursor: pointer; font-weight: 600;
            font-size: 0.8rem; transition: all 0.2s;
        }
        .btn-delete:hover { background: var(--accent-pink-deep); color: white; border-color: var(--accent-pink-deep); }

        /* Toast */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px);
            color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.85rem; font-weight: 600;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- 登录拦截 -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>🛡️ 管理员鉴权</h2>
        <input type="password" id="pwdInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="btn" onclick="doLogin()">进入控制台</button>
    </div>
</div>

<div id="toast"></div>

<div class="container" style="display: none;" id="adminDashboard">
    <div class="header">
        <h1>⚙️ 管理控制台</h1>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 5px;">在这里可以强制管理所有订单</p>
    </div>

    <!-- 核心数据 -->
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-value" id="statCount">0</div>
            <div class="stat-label">总份数</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="statMoney">¥0</div>
            <div class="stat-label">预计总金额</div>
        </div>
    </div>

    <!-- 订单列表 -->
    <div class="card">
        <h3 style="margin-bottom: 15px; font-size: 1rem;">📋 实时订单明细</h3>
        <div id="orderList">
            <div style="text-align: center; padding: 20px; color: var(--text-tertiary);">加载中...</div>
        </div>
    </div>

    <!-- 危险操作区 -->
    <div class="card" style="border-color: rgba(255, 92, 141, 0.4);">
        <h3 style="margin-bottom: 15px; font-size: 1rem; color: var(--accent-pink-deep);">⚠️ 危险操作</h3>
        <button class="btn btn-danger" onclick="forceClearAll()">🗑️ 清空所有数据 (一键重置)</button>
        <button class="btn" style="background: transparent; color: var(--text-secondary); border: 1px solid var(--border-soft); margin-top: 10px;" onclick="logout()">退出登录</button>
    </div>
</div>

<script>
    const CONFIG = {
        API_URL: 'https://api.yukiom.us.ci/' // 请确保与主页的 API_URL 一致
    };

    let adminPassword = sessionStorage.getItem('adminPassword') || '';

    // ============ 初始化校验 ============
    function checkAuth() {
        if (adminPassword) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            initTheme();
            fetchData();
            // 每 15 秒自动刷新
            setInterval(fetchData, 15000);
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }
    }

    function doLogin() {
        const val = document.getElementById('pwdInput').value;
        if(!val) return showToast('请输入密码', true);
        adminPassword = val;
        sessionStorage.setItem('adminPassword', adminPassword);
        checkAuth();
    }

    function logout() {
        sessionStorage.removeItem('adminPassword');
        adminPassword = '';
        checkAuth();
    }

    // ============ 主题 ============
    function initTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }

    // ============ UI 交互 ============
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
        toast.style.background = isError ? 'rgba(255, 70, 100, 0.95)' : 'rgba(45, 35, 50, 0.95)';
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatTime(timestamp) {
        if (!timestamp) return '未知';
        const d = new Date(timestamp);
        return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ============ 核心 API 逻辑 ============
    async function fetchData() {
        try {
            const res = await fetch(CONFIG.API_URL);
            if (!res.ok) throw new Error('网络请求失败');
            const data = await res.json();
            renderDashboard(data);
        } catch (e) {
            showToast('获取数据失败', true);
        }
    }

    function renderDashboard(orders) {
        let totalMoney = 0;
        
        const listEl = document.getElementById('orderList');
        listEl.innerHTML = '';

        if(orders.length === 0) {
            listEl.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-tertiary);">当前没有任何订单</div>';
        } else {
            // 按时间倒序
            orders.sort((a, b) => (b.time || 0) - (a.time || 0)).forEach(o => {
                totalMoney += (o.price || 0);
                
                const row = document.createElement('div');
                row.className = 'order-row';
                row.innerHTML = `
                    <div class="order-main">
                        <span class="order-name">
                            ${escapeHtml(o.name)}
                            <span class="badge">${escapeHtml(o.food)} (¥${o.price})</span>
                        </span>
                        <span class="order-time">⏰ ${formatTime(o.time)}</span>
                    </div>
                    <button class="btn-delete" onclick="forceDeleteOrder('${escapeHtml(o.name)}')">强制撤销</button>
                `;
                listEl.appendChild(row);
            });
        }

        document.getElementById('statCount').innerText = orders.length;
        document.getElementById('statMoney').innerText = '¥' + totalMoney;
    }

    // 管理员：强制撤销某人订单（通过 adminPassword 绕过 Token 校验）
    async function forceDeleteOrder(name) {
        if(!confirm(`⚠️ 确定要强制删除【${name}】的订单吗？`)) return;
        
        try {
            const res = await fetch(CONFIG.API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, adminPassword: adminPassword })
            });
            
            const result = await res.json();
            if (!res.ok) {
                if(res.status === 403) {
                    logout(); // 密码错误自动登出
                    throw new Error('鉴权失败：密码错误');
                }
                throw new Error(result.error || '删除失败');
            }
            
            showToast(`已强制撤销 ${name} 的订单`);
            fetchData();
        } catch (e) {
            showToast(e.message, true);
        }
    }

    // 管理员：清空全部
    async function forceClearAll() {
        if(!confirm(`🚨 危险操作！\n确定要【清空所有人的订单】吗？`)) return;
        
        try {
            const res = await fetch(CONFIG.API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminPassword: adminPassword })
            });
            
            const result = await res.json();
            if (!res.ok) {
                if(res.status === 403) {
                    logout();
                    throw new Error('鉴权失败：密码错误');
                }
                throw new Error(result.error || '清空失败');
            }
            
            showToast('已清空全部数据！');
            fetchData();
        } catch (e) {
            showToast(e.message, true);
        }
    }

    // 启动
    checkAuth();
</script>
</body>
</html>
