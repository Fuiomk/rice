<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>统计</title>
    <style>
        :root {
            --primary: #e67e22;
            --primary-hover: #cf711f;
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border: #e0e6ed;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); padding: 20px 15px; color: var(--text-main); line-height: 1.6; }

        .container { max-width: 600px; margin: 0 auto; }

        /* 顶部状态条 */
        .status-bar {
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 15px; text-align: center; color: var(--primary); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-main); }
        
        select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border);
            font-size: 1rem; outline: none; background-color: #fff; appearance: none;
        }

        /* 餐品网格 */
        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .food-item {
            border: 1.5px solid var(--border); border-radius: 12px; padding: 15px 10px;
            text-align: center; cursor: pointer; transition: all 0.2s; background: #fff;
        }
        .food-item.active { border-color: var(--primary); background: #fffaf5; color: var(--primary); font-weight: bold; box-shadow: 0 4px 10px rgba(230,126,34,0.1); }
        .food-price { font-size: 0.8rem; color: var(--text-sub); display: block; margin-top: 4px; }

        /* 按钮 */
        .btn {
            border: none; padding: 16px; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: all 0.2s; font-size: 1rem; width: 100%;
            margin-top: 10px;
        }
        .btn-submit { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(230,126,34,0.3); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* 统计表 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); color: var(--text-sub); font-size: 0.85rem; }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .total-amount { color: var(--primary); font-weight: 800; font-size: 1.2rem; }

        /* 订单明细 */
        .order-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #f8f9fa;
        }
        .order-name { font-weight: bold; }
        .order-info { font-size: 0.85rem; color: var(--text-sub); }
        .tag { background: #fdf2e9; color: #e67e22; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-left: 5px; }

        footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: var(--text-sub); padding-bottom: 30px; }
        .admin-reset { background: none; border: none; color: #bdc3c7; cursor: pointer; font-size: 0.7rem; margin-top: 20px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncIndicator" class="status-bar">
        <span id="syncDot" style="width:8px;height:8px;background:#ccc;border-radius:50%"></span>
        <span id="syncText">正在连接服务器...</span>
    </div>

    <div class="card">
        <h1>统计</h1>
        
        <div class="form-group">
            <label>👤 你的姓名</label>
            <select id="studentSelect">
                <option value="">请选择你的名字...</option>
            </select>
        </div>

        <div class="form-group">
            <label>🍽️ 选择餐品</label>
            <div class="food-grid" id="foodGrid">
                <!-- 动态渲染 -->
            </div>
        </div>

        <button class="btn btn-submit" id="submitBtn" onclick="submitOrder()">✨ 提交订单</button>
    </div>

    <div class="card">
        <label>📊 实时汇总</label>
        <table>
            <thead>
                <tr><th>餐品</th><th>数量</th><th>小计</th></tr>
            </thead>
            <tbody id="summaryBody"></tbody>
            <tfoot>
                <tr>
                    <td colspan="2" style="text-align:right; padding-top:20px; font-weight:bold;">总金额：</td>
                    <td class="total-amount" id="totalPrice" style="padding-top:20px;">0元</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="card">
        <label>📋 点单记录</label>
        <div id="orderDetailList">
            <!-- 动态渲染 -->
        </div>
        <button class="admin-reset" onclick="resetAll()">管理员重置数据</button>
    </div>

    <footer>
        Bro<br>
        © 2026 点饭系统
    </footer>
</div>

<script>
    // --- 配置区 ---
    const API_URL = 'https://rice-api.sb250666sbb.workers.dev/'; 
    const NAMES = ['周', '陈', '袁', '范', '祝', '何', '黄', '宋'];
    const MENU = [
        { name: '炒饭', price: 6 },
        { name: '炒粉', price: 7 },
        { name: '汤粉', price: 5 },
        { name: '炒河粉', price: 6 }
    ];

    let orders = [];
    let selectedFoodIdx = null;

    // --- 逻辑区 ---

    // 初始化加载
    async function init() {
        renderFoodGrid();
        await fetchData();
        // 每 20 秒自动拉取一次数据
        setInterval(fetchData, 20000);
    }

    // 从 Worker 获取数据
    async function fetchData() {
        const dot = document.getElementById('syncDot');
        const txt = document.getElementById('syncText');
        
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error();
            orders = await res.json();
            
            dot.style.background = "#2ecc71";
            txt.innerText = "数据已同步 (" + new Date().toLocaleTimeString() + ")";
            
            renderNameSelect();
            refreshUI();
        } catch (e) {
            dot.style.background = "#e74c3c";
            txt.innerText = "同步失败，请检查网络";
        }
    }

    // 渲染姓名下拉框
    function renderNameSelect() {
        const select = document.getElementById('studentSelect');
        const currentSelected = select.value;
        
        select.innerHTML = '<option value="">请选择你的名字...</option>';
        NAMES.forEach(name => {
            const hasOrdered = orders.some(o => o.name === name);
            const opt = document.createElement('option');
            opt.value = name;
            opt.text = name + (hasOrdered ? ' (已点过)' : '');
            opt.disabled = hasOrdered;
            select.appendChild(opt);
        });
        
        // 恢复之前选中的值（如果还没点的话）
        if (currentSelected && NAMES.includes(currentSelected)) {
            select.value = currentSelected;
        }
    }

    // 渲染餐品格子
    function renderFoodGrid() {
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        MENU.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `food-item ${selectedFoodIdx === index ? 'active' : ''}`;
            div.innerHTML = `${item.name}<span class="food-price">${item.price}元</span>`;
            div.onclick = () => {
                selectedFoodIdx = index;
                renderFoodGrid();
            };
            grid.appendChild(div);
        });
    }

    // 提交订单
    async function submitOrder() {
        const name = document.getElementById('studentSelect').value;
        if (!name) return alert("请先选择你的姓名！");
        if (selectedFoodIdx === null) return alert("请选择你想吃的餐品！");

        const food = MENU[selectedFoodIdx];
        const btn = document.getElementById('submitBtn');

        if (!confirm(`确认点餐吗？\n姓名：${name}\n餐品：${food.name}\n金额：${food.price}元`)) return;

        btn.disabled = true;
        btn.innerText = "正在提交...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    food: food.name,
                    price: food.price,
                    time: Date.now()
                })
            });

            if (res.ok) {
                alert("点餐成功！页面将自动刷新。");
                selectedFoodIdx = null;
                await fetchData();
            } else {
                const err = await res.json();
                alert(err.error || "提交失败，请重试");
                await fetchData();
            }
        } catch (e) {
            alert("网络故障，提交未成功");
        } finally {
            btn.disabled = false;
            btn.innerText = "✨ 提交订单";
        }
    }

    // 刷新统计和明细
    function refreshUI() {
        // 汇总表
        const summaryBody = document.getElementById('summaryBody');
        let totalAll = 0;
        summaryBody.innerHTML = '';
        
        MENU.forEach(m => {
            const count = orders.filter(o => o.food === m.name).length;
            if (count > 0) {
                const sub = count * m.price;
                totalAll += sub;
                summaryBody.innerHTML += `<tr><td>${m.name}</td><td>${count}份</td><td>${sub}元</td></tr>`;
            }
        });
        document.getElementById('totalPrice').innerText = totalAll + '元';

        // 明细列表
        const detailList = document.getElementById('orderDetailList');
        if (orders.length === 0) {
            detailList.innerHTML = '<p style="text-align:center;color:#ccc;padding:20px;font-size:0.8rem;">暂无订单数据</p>';
        } else {
            detailList.innerHTML = '';
            // 按时间倒序排
            const sortedOrders = [...orders].sort((a,b) => b.time - a.time);
            sortedOrders.forEach(o => {
                detailList.innerHTML += `
                    <div class="order-row">
                        <span class="order-name">${o.name}<span class="tag">${o.food}</span></span>
                        <span class="order-info">${o.price}元</span>
                    </div>
                `;
            });
        }
    }

    // 重置数据
    async function resetAll() {
        if (!confirm("⚠️ 管理员操作：确定要清空所有订单吗？此操作不可恢复！")) return;
        
        try {
            const res = await fetch(API_URL, { method: 'DELETE' });
            if (res.ok) {
                alert("已成功清空所有数据");
                await fetchData();
            }
        } catch (e) {
            alert("重置失败");
        }
    }

    init();
</script>

</body>
</html>
